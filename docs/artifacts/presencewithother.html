<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presence With Another</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400&family=Courier+Prime:wght@400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --c-body:#B06040;--c-soc:#2A5070;--c-nd:#5A3A90;
  --c-bias:#A03828;--c-cap:#384050;--c-vuln:#3A5840;
}
html,body{width:100%;height:100%;background:#04030A;overflow:hidden}
.scene{width:100vw;height:100vh;perspective:1000px;cursor:grab;position:relative}
.scene:active{cursor:grabbing}

.cube-system{
  width:200px;height:200px;
  position:absolute;top:50%;left:50%;
  transform-style:preserve-3d;
  transform:translateX(-50%) translateY(-50%) rotateX(-22deg) rotateY(35deg);
}

/* INNER FACES */
.face{position:absolute;width:200px;height:200px;
  border:1px solid rgba(255,255,255,0.15);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:16px;text-align:center;backface-visibility:visible;}
.face-front {transform:translateZ(100px);  background:rgba(176,96,64,0.18)}
.face-back  {transform:rotateY(180deg) translateZ(100px); background:rgba(42,80,112,0.18)}
.face-right {transform:rotateY(90deg)  translateZ(100px); background:rgba(90,58,144,0.18)}
.face-left  {transform:rotateY(-90deg) translateZ(100px); background:rgba(160,56,40,0.18)}
.face-top   {transform:rotateX(90deg)  translateZ(100px); background:rgba(56,64,80,0.20)}
.face-bottom{transform:rotateX(-90deg) translateZ(100px); background:rgba(58,88,64,0.20)}

.face-icon{font-size:1.6rem;margin-bottom:6px;display:block}
.face-label{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.1em;
  text-transform:uppercase;color:rgba(255,255,255,0.88);line-height:1.45;}

/* CENTER GLOW */
.center-glow{
  position:absolute;width:52px;height:52px;top:50%;left:50%;
  transform:translateX(-50%) translateY(-50%) translateZ(0);
  border-radius:50%;pointer-events:none;
  background:radial-gradient(circle,rgba(232,180,160,0.95) 0%,rgba(200,120,100,0.3) 55%,transparent 75%);
  animation:pulse 2.5s ease-in-out infinite;
}
@keyframes pulse{
  0%,100%{opacity:.65;transform:translateX(-50%) translateY(-50%) scale(1)}
  50%{opacity:1;transform:translateX(-50%) translateY(-50%) scale(1.28)}
}

/* DRIFT CUBE */
.drift-face{position:absolute;width:280px;height:280px;left:-40px;top:-40px;
  border:1px dashed rgba(60,80,200,0.35);background:rgba(40,60,180,0.02);
  pointer-events:none;}
.drift-face-front {transform:translateZ(140px)}
.drift-face-back  {transform:rotateY(180deg) translateZ(140px)}
.drift-face-right {transform:rotateY(90deg) translateZ(140px)}
.drift-face-left  {transform:rotateY(-90deg) translateZ(140px)}
.drift-face-top   {transform:rotateX(90deg) translateZ(140px)}
.drift-face-bottom{transform:rotateX(-90deg) translateZ(140px)}

/* FRACTURE CUBE */
.fracture-face{position:absolute;width:370px;height:370px;left:-85px;top:-85px;
  border:1px dashed rgba(180,30,30,0.28);background:rgba(160,20,20,0.015);
  pointer-events:none;}
.fracture-face-front {transform:translateZ(185px)}
.fracture-face-back  {transform:rotateY(180deg) translateZ(185px)}
.fracture-face-right {transform:rotateY(90deg) translateZ(185px)}
.fracture-face-left  {transform:rotateY(-90deg) translateZ(185px)}
.fracture-face-top   {transform:rotateX(90deg) translateZ(185px)}
.fracture-face-bottom{transform:rotateX(-90deg) translateZ(185px)}
</style>
</head>
<body>
<div class="scene" id="scene">
  <div class="cube-system" id="cube">

    <div class="fracture-face fracture-face-front"></div>
    <div class="fracture-face fracture-face-back"></div>
    <div class="fracture-face fracture-face-right"></div>
    <div class="fracture-face fracture-face-left"></div>
    <div class="fracture-face fracture-face-top"></div>
    <div class="fracture-face fracture-face-bottom"></div>

    <div class="drift-face drift-face-front"></div>
    <div class="drift-face drift-face-back"></div>
    <div class="drift-face drift-face-right"></div>
    <div class="drift-face drift-face-left"></div>
    <div class="drift-face drift-face-top"></div>
    <div class="drift-face drift-face-bottom"></div>

    <div class="face face-front">
      <span class="face-icon">◯</span>
      <div class="face-label">Body Image<br>& Self</div>
    </div>
    <div class="face face-back">
      <span class="face-icon">▭</span>
      <div class="face-label">Social Constraints<br>& Limits</div>
    </div>
    <div class="face face-right">
      <span class="face-icon">◈</span>
      <div class="face-label">Neurodivergence<br>Trauma & MH</div>
    </div>
    <div class="face face-left">
      <span class="face-icon">△</span>
      <div class="face-label">Bias &<br>Oppression</div>
    </div>
    <div class="face face-top">
      <span class="face-icon">⊞</span>
      <div class="face-label">Capitalism<br>Stress</div>
    </div>
    <div class="face face-bottom">
      <span class="face-icon">◫</span>
      <div class="face-label">Vulnerability<br>Walls</div>
    </div>

    <div class="center-glow"></div>
  </div>
</div>

<script>
const scene=document.getElementById('scene');
const cube=document.getElementById('cube');
let isDragging=false,rotX=-22,rotY=35,velX=0,velY=0,lastX,lastY,rafId;

function applyRot(){
  cube.style.transform=`translateX(-50%) translateY(-50%) rotateX(${rotX}deg) rotateY(${rotY}deg)`;
}
scene.addEventListener('mousedown',e=>{
  isDragging=true;lastX=e.clientX;lastY=e.clientY;velX=0;velY=0;
  cancelAnimationFrame(rafId);e.preventDefault();
});
window.addEventListener('mousemove',e=>{
  if(!isDragging)return;
  const dx=e.clientX-lastX,dy=e.clientY-lastY;
  velX=dx;velY=dy;rotY+=dx*.5;rotX-=dy*.5;
  rotX=Math.max(-85,Math.min(85,rotX));applyRot();
  lastX=e.clientX;lastY=e.clientY;
});
window.addEventListener('mouseup',()=>{if(isDragging){isDragging=false;inertia();}});
function inertia(){
  velX*=.92;velY*=.92;
  if(Math.abs(velX)<.05&&Math.abs(velY)<.05)return;
  rotY+=velX*.5;rotX-=velY*.5;
  rotX=Math.max(-85,Math.min(85,rotX));applyRot();
  rafId=requestAnimationFrame(inertia);
}
scene.addEventListener('touchstart',e=>{
  const t=e.touches[0];isDragging=true;lastX=t.clientX;lastY=t.clientY;
  velX=0;velY=0;cancelAnimationFrame(rafId);
},{passive:true});
scene.addEventListener('touchmove',e=>{
  if(!isDragging)return;const t=e.touches[0];
  const dx=t.clientX-lastX,dy=t.clientY-lastY;
  velX=dx;velY=dy;rotY+=dx*.5;rotX-=dy*.5;
  rotX=Math.max(-85,Math.min(85,rotX));applyRot();
  lastX=t.clientX;lastY=t.clientY;
},{passive:true});
scene.addEventListener('touchend',()=>{isDragging=false;inertia();});
scene.addEventListener('wheel',e=>{
  e.preventDefault();
  const f=e.deltaY>0?.95:1.05;
  const cur=parseFloat(scene.style.perspective||'1000');
  scene.style.perspective=Math.max(400,Math.min(1800,cur*f))+'px';
},{passive:false});

// auto-rotate when idle
let idleTimer,autoOn=false;
function startAuto(){autoOn=true;(function s(){if(!isDragging&&autoOn){rotY+=.12;applyRot();rafId=requestAnimationFrame(s);}})();}
function resetIdle(){clearTimeout(idleTimer);autoOn=false;cancelAnimationFrame(rafId);idleTimer=setTimeout(startAuto,3000);}
['mousemove','touchmove'].forEach(ev=>document.addEventListener(ev,resetIdle));
resetIdle();
</script>
</body>
</html>
